<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cover Map Highlighter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; height: 100vh; }

#controls {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: rgba(22, 33, 62, 0.95); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  padding: 10px 16px; display: flex; align-items: center; gap: 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1); flex-wrap: wrap;
}
#controls label { font-size: 13px; color: #aab; white-space: nowrap; }
#controls input[type="color"] { width: 36px; height: 36px; border: 2px solid #445; border-radius: 8px; cursor: pointer; background: none; padding: 2px; }
#controls input[type="range"] { width: 100px; accent-color: #e94560; }
.control-group { display: flex; align-items: center; gap: 6px; }
.control-group .val { font-size: 12px; color: #e94560; min-width: 28px; text-align: right; font-variant-numeric: tabular-nums; }
button {
  background: #e94560; color: #fff; border: none; padding: 8px 14px;
  border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500;
  transition: background 0.2s;
}
button:hover { background: #c73650; }
button.secondary { background: #334; }
button.secondary:hover { background: #445; }
.spacer { flex: 1; }
#mode-indicator { font-size: 12px; padding: 4px 10px; border-radius: 12px; background: #334; }
#mode-indicator.active { background: #e94560; }

#map { width: 100vw; height: 100vh; padding-top: 60px; background: #0f3460; }
#photo-thumbs-container {
  position: absolute; top: 0; left: 0; z-index: 460;
  pointer-events: none;
}
#draw-canvas {
  position: absolute; top: 0; left: 0; z-index: 450;
  pointer-events: none; cursor: crosshair;
}
#draw-canvas.active { pointer-events: auto; cursor: none; }

#cursor-circle {
  position: fixed; pointer-events: none; z-index: 9999;
  border: 2px solid rgba(255,255,255,0.8); border-radius: 50%;
  transform: translate(-50%, -50%); display: none;
  box-shadow: 0 0 4px rgba(0,0,0,0.5);
}

#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: rgba(22,33,62,0.95); color: #eee; padding: 10px 20px;
  border-radius: 8px; font-size: 13px; z-index: 2000; opacity: 0;
  transition: opacity 0.3s; pointer-events: none;
}
#toast.show { opacity: 1; }
#coverage-display { font-size: 13px; color: #e94560; font-weight: 500; min-width: 40px; text-align: right; }
.separator { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
#sync-status { font-size: 11px; color: #888; min-width: 60px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }
#sync-status.synced { color: #4caf50; }
#sync-status.syncing { color: #ff9800; }
#sync-status.error { color: #f44336; }
#modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 5000;
  background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center;
}
#modal-overlay.show { display: flex; }
#modal {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
  padding: 24px; width: 520px; max-width: 90vw; max-height: 80vh; overflow-y: auto;
}
#modal h3 { margin: 0 0 16px; font-size: 16px; }
#modal p { font-size: 13px; color: #aab; margin: 0 0 10px; line-height: 1.5; }
#modal code { background: #334; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
#modal ol { font-size: 13px; color: #aab; margin: 0 0 10px; padding-left: 20px; line-height: 1.8; }
#modal input[type="text"] {
  width: 100%; padding: 10px; background: #16213e; border: 1px solid #445; border-radius: 6px;
  color: #eee; font-size: 13px; margin-bottom: 12px;
}
#modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
#modal-connect { background: #4285f4; }
#modal-connect:hover { background: #3367d6; }

#photo-picker-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 5000;
  background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center;
}
#photo-picker-overlay.show { display: flex; }
#photo-picker {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px;
  padding: 20px; width: 520px; max-width: 90vw; max-height: 80vh; display: flex; flex-direction: column;
}
#photo-picker h3 { margin: 0 0 12px; font-size: 16px; }
#photo-picker-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
  overflow-y: auto; flex: 1; max-height: 50vh; padding: 4px;
}
#photo-picker-grid .photo-item {
  aspect-ratio: 1; border-radius: 6px; overflow: hidden; cursor: pointer;
  border: 3px solid transparent; transition: border-color 0.15s, transform 0.15s;
  position: relative;
}
#photo-picker-grid .photo-item:hover { transform: scale(1.05); }
#photo-picker-grid .photo-item.selected { border-color: #e94560; }
#photo-picker-grid .photo-item img { width: 100%; height: 100%; object-fit: cover; }
#photo-picker-grid .photo-item .check {
  position: absolute; top: 4px; right: 4px; width: 22px; height: 22px;
  background: #e94560; border-radius: 50%; display: none; align-items: center;
  justify-content: center; font-size: 13px; color: #fff; font-weight: bold;
}
#photo-picker-grid .photo-item.selected .check { display: flex; }
#photo-picker-load-more {
  margin-top: 10px; text-align: center;
}
#photo-picker-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
#photo-picker-empty { text-align: center; color: #888; padding: 40px 0; font-size: 13px; }

#photo-viewer-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 6000;
  background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
}
#photo-viewer-overlay.show { display: flex; }
#photo-viewer-content { max-width: 90vw; max-height: 90vh; position: relative; }
#photo-viewer-content img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 4px; }
#photo-viewer-counter {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  color: #ccc; font-size: 13px; z-index: 6001;
}
#photo-viewer-close {
  position: fixed; top: 16px; right: 16px; z-index: 6001;
  background: rgba(255,255,255,0.15); border: none; color: #fff;
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#photo-viewer-close:hover { background: rgba(255,255,255,0.3); }
#photo-viewer-delete {
  position: fixed; bottom: 24px; right: 24px; z-index: 6001;
  background: rgba(220,50,50,0.8); border: none; color: #fff;
  padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer;
}
#photo-viewer-delete:hover { background: rgba(220,50,50,1); }
#photo-viewer-nav {
  position: fixed; top: 50%; transform: translateY(-50%); z-index: 6001;
  background: rgba(255,255,255,0.1); border: none; color: #fff;
  width: 44px; height: 44px; border-radius: 50%; font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
#photo-viewer-nav:hover { background: rgba(255,255,255,0.25); }
.photo-viewer-prev { left: 16px; }
.photo-viewer-next { right: 16px; }

.photo-thumb {
  position: absolute; z-index: 460; width: 48px; height: 48px;
  border-radius: 6px; overflow: hidden; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  transition: transform 0.15s; pointer-events: auto;
  background: #334; display: flex; align-items: center; justify-content: center;
}
.photo-thumb:hover { transform: scale(1.15); z-index: 461; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb-placeholder { color: #888; font-size: 18px; }
</style>
</head>
<body>

<div id="controls">
  <div class="control-group">
    <label for="brush-color">Color</label>
    <input type="color" id="brush-color" value="#e94560">

    <label for="brush-opacity">Opacity</label>
    <input type="range" id="brush-opacity" min="5" max="100" value="50">
    <span class="val" id="brush-opacity-val">50%</span>

    <span id="sync-status"></span>
  </div>
  <div class="control-group">
    <label for="brush-size">Size</label>
    <input type="range" id="brush-size" min="3" max="60" value="16">
    <span class="val" id="brush-size-val">16</span>

    <span id="mode-indicator">Viewing</span>
    <span id="coverage-display">0%</span>
    <span class="separator"></span>
    <button id="btn-gdrive" class="secondary" title="Sync to Google Drive">GDrive</button>
  </div>
  <div class="control-group">
    <span class="spacer"></span>
    <button id="btn-draw" class="secondary">Draw</button>
    <button id="btn-eraser" class="secondary">Eraser</button>
    <span class="separator"></span>
    <button id="btn-photo" class="secondary">Photo</button>
    <button id="btn-toggle-photos" class="secondary">Hide</button>
  </div>
</div>

<div id="map"></div>
<canvas id="draw-canvas"></canvas>
<div id="photo-thumbs-container"></div>
<div id="cursor-circle"></div>
<div id="toast"></div>

<div id="modal-overlay">
  <div id="modal">
    <h3>Google Drive Sync</h3>
    <p>Connect your Google Drive to save and load highlights across devices.</p>
    <p style="color:#888; font-size:12px;">You'll be redirected to Google to grant access, then returned here automatically.</p>
    <div class="modal-actions">
      <button id="modal-cancel" class="secondary">Cancel</button>
      <button id="modal-connect">Connect to Drive</button>
    </div>
  </div>
</div>

<div id="photo-picker-overlay">
  <div id="photo-picker">
    <h3>Select Photos</h3>
    <div id="photo-picker-grid"></div>
    <div id="photo-picker-load-more"></div>
    <div id="photo-picker-actions">
      <button id="photo-picker-cancel" class="secondary">Cancel</button>
    </div>
  </div>
</div>

<div id="photo-viewer-overlay">
  <div id="photo-viewer-counter"></div>
  <button id="photo-viewer-close">&times;</button>
  <button id="photo-viewer-delete">Delete</button>
  <button class="photo-viewer-nav photo-viewer-prev" style="display:none">&#8249;</button>
  <button class="photo-viewer-nav photo-viewer-next" style="display:none">&#8250;</button>
  <div id="photo-viewer-content"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  var STORAGE_KEY = 'cover-highlights';
  var canvas = document.getElementById('draw-canvas');
  var ctx = canvas.getContext('2d');
  var cursorEl = document.getElementById('cursor-circle');

  var highlights = [];
  var currentStroke = null;
  var isDrawing = false;
  var drawMode = false;
  var eraserMode = false;
  var globalOpacity = 0.5;

  var photoMode = false;
  var photos = [];
  var photoViewerCurrentIndex = 0;
  var photoViewerPhotos = [];
  var photoViewerCurrentPhoto = null;
  var photoViewerPhotoIndex = -1;

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var data = JSON.parse(raw);
        highlights = data.highlights || [];
        globalOpacity = data.globalOpacity || 0.5;
        photos = data.photos || [];
      }
    } catch(e) { console.warn('Failed to load data', e); }
  }

  function saveData() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ highlights: highlights, globalOpacity: globalOpacity, photos: photos }));
    } catch(e) { console.warn('Failed to save data', e); }
  }

  var map = L.map('map', {
    center: [36.5, 138.0],
    zoom: 6,
    zoomControl: false
  });

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 19
  }).addTo(map);

  function resizeCanvas() {
    var mapEl = document.getElementById('map');
    var rect = mapEl.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    canvas.style.top = rect.top + 'px';
    canvas.style.left = rect.left + 'px';
    var thumbsContainer = document.getElementById('photo-thumbs-container');
    thumbsContainer.style.width = rect.width + 'px';
    thumbsContainer.style.height = rect.height + 'px';
    thumbsContainer.style.top = rect.top + 'px';
    thumbsContainer.style.left = rect.left + 'px';
    renderAll();
  }

  function latLngToPixel(lat, lng) {
    var point = map.latLngToContainerPoint([lat, lng]);
    return [point.x, point.y];
  }

  function pixelToLatLng(x, y) {
    var point = map.containerPointToLatLng([x, y]);
    return [point.lat, point.lng];
  }

  function getBrushSize() {
    return parseInt(document.getElementById('brush-size').value);
  }

  function renderAll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < highlights.length; i++) {
      renderStroke(highlights[i], highlights[i].opacity != null ? highlights[i].opacity : globalOpacity);
    }
    if (currentStroke) {
      renderStroke(currentStroke, currentStroke.opacity != null ? currentStroke.opacity : globalOpacity);
    }
    updateCoverage();
  }

  function renderStroke(stroke, opacity) {
    if (!stroke.points || stroke.points.length < 2) return;
    var drawZoom = stroke.zoom != null ? stroke.zoom : map.getZoom();
    var scale = Math.pow(2, map.getZoom() - drawZoom);
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth = Math.max(4, stroke.size * scale); //zoom out show
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    var first = latLngToPixel(stroke.points[0][0], stroke.points[0][1]);
    ctx.moveTo(first[0], first[1]);
    for (var i = 1; i < stroke.points.length; i++) {
      var pt = latLngToPixel(stroke.points[i][0], stroke.points[i][1]);
      ctx.lineTo(pt[0], pt[1]);
    }
    ctx.stroke();
    ctx.restore();
  }

  function updateCoverage() {
    if (canvas.width === 0 || canvas.height === 0) return;
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var pixels = imageData.data;
    var covered = 0;
    var total = pixels.length / 4;
    for (var i = 3; i < pixels.length; i += 4) {
      if (pixels[i] > 0) covered++;
    }
    var pct = total > 0 ? Math.round((covered / total) * 100) : 0;
    document.getElementById('coverage-display').textContent = pct + '%';
  }

  function eraseAt(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    var radius = getBrushSize() / 2;
    var changed = false;
    for (var s = highlights.length - 1; s >= 0; s--) {
      var stroke = highlights[s];
      var drawZoom = stroke.zoom != null ? stroke.zoom : map.getZoom();
      var scale = Math.pow(2, map.getZoom() - drawZoom);
      var scaledSize = Math.max(4, stroke.size * scale); //zoom out edit
      for (var i = 0; i < stroke.points.length; i++) {
        var pt = latLngToPixel(stroke.points[i][0], stroke.points[i][1]);
        var dx = pt[0] - x;
        var dy = pt[1] - y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < radius + scaledSize / 2) {
          highlights.splice(s, 1);
          changed = true;
          break;
        }
      }
    }
    if (changed) {
      saveData();
      renderAll();
    }
  }

  function startDraw(clientX, clientY) {
    if (!drawMode && !eraserMode) return;
    var rect = canvas.getBoundingClientRect();
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    if (x < 0 || y < 0 || x > canvas.width || y > canvas.height) return;
    isDrawing = true;
    if (eraserMode) {
      eraseAt(clientX, clientY);
      return;
    }
    var latlng = pixelToLatLng(x, y);
    currentStroke = {
      points: [latlng],
      color: document.getElementById('brush-color').value,
      size: getBrushSize(),
      zoom: map.getZoom(),
      opacity: globalOpacity
    };
  }

  function moveDraw(clientX, clientY) {
    if (!isDrawing) return;
    if (eraserMode) {
      eraseAt(clientX, clientY);
      return;
    }
    if (!currentStroke) return;
    var rect = canvas.getBoundingClientRect();
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    var latlng = pixelToLatLng(x, y);
    currentStroke.points.push(latlng);
    renderAll();
  }

  function endDraw() {
    if (!isDrawing) return;
    isDrawing = false;
    if (currentStroke && currentStroke.points.length > 1) {
      highlights.push(currentStroke);
      saveData();
    }
    currentStroke = null;
    renderAll();
  }

  function isPhotosAvailable() {
    return isCapacitor() && Capacitor.Plugins.GoogleDrive;
  }

  function openPhotoPicker(lat, lng) {
    if (!isPhotosAvailable()) {
      toast('Google Photos not available. Connect to GDrive first.');
      return;
    }
    var overlay = document.getElementById('photo-picker-overlay');
    var grid = document.getElementById('photo-picker-grid');
    grid.innerHTML = '<div id="photo-picker-empty">Opening Google Photos picker...</div>';
    document.getElementById('photo-picker-load-more').innerHTML = '';
    overlay.classList.add('show');

    Capacitor.Plugins.GoogleDrive.createPickerSession()
      .then(function(result) {
        var sessionId = result.id;
        var pickerUri = result.pickerUri;
        if (!pickerUri) {
          grid.innerHTML = '<div id="photo-picker-empty">Failed to create picker session</div>';
          return;
        }
        if (typeof Capacitor.Plugins.Browser !== 'undefined') {
          Capacitor.Plugins.Browser.open({ url: pickerUri });
        } else {
          window.open(pickerUri, '_blank');
        }
        grid.innerHTML = '<div id="photo-picker-empty">Select photos in Google Photos, then return here...</div>';
        setTimeout(function() {
          pollPickerSession(sessionId, lat, lng, 0);
        }, 3000);
      })
      .catch(function(err) {
        console.error('Failed to create picker session', err);
        grid.innerHTML = '<div id="photo-picker-empty">Failed to start picker. Make sure GDrive is connected.</div>';
      });
  }

  var pickerPollTimer = null;

  function pollPickerSession(sessionId, lat, lng, retryCount) {
    if (pickerPollTimer) clearTimeout(pickerPollTimer);
    var maxRetries = 5;
    var retryDelays = [3000, 5000, 8000, 12000, 20000];

    Capacitor.Plugins.GoogleDrive.getSession({ sessionId: sessionId })
      .then(function(result) {
        if (result.mediaItemsSet) {
          fetchPickedItems(sessionId, lat, lng);
        } else {
          var interval = 2000;
          if (result.pollingConfig && result.pollingConfig.pollInterval) {
            interval = parseInt(result.pollingConfig.pollInterval.replace('s', '')) * 1000;
          }
          pickerPollTimer = setTimeout(function() {
            pollPickerSession(sessionId, lat, lng, 0);
          }, interval);
        }
      })
      .catch(function(err) {
        console.error('Failed to poll session', err);
        if (retryCount < maxRetries) {
          var delay = retryDelays[retryCount] || 20000;
          toast('Retrying... (' + (retryCount + 1) + '/' + maxRetries + ')');
          pickerPollTimer = setTimeout(function() {
            pollPickerSession(sessionId, lat, lng, retryCount + 1);
          }, delay);
        } else {
          document.getElementById('photo-picker-grid').innerHTML =
            '<div id="photo-picker-empty">Failed to check picker status. Please try again.</div>';
        }
      });
  }

  function fetchPickedItems(sessionId, lat, lng) {
    var grid = document.getElementById('photo-picker-grid');
    grid.innerHTML = '<div id="photo-picker-empty">Loading selected photos...</div>';
    Capacitor.Plugins.GoogleDrive.listPickedMediaItems({ sessionId: sessionId })
      .then(function(result) {
        var items = result.mediaItems || [];
        document.getElementById('photo-picker-overlay').classList.remove('show');
        if (items.length > 0) {
          var mediaIds = [];
          var baseUrls = {};
          var thumbPromises = [];
          var compressedPromises = [];
          for (var i = 0; i < items.length; i++) {
            var mf = items[i].mediaFile || items[i];
            mediaIds.push(items[i].id);
            baseUrls[items[i].id] = mf.baseUrl;
            thumbPromises.push(
              Capacitor.Plugins.GoogleDrive.fetchImageAsBase64({ url: mf.baseUrl + '=w96-h96-c' })
                .then(function(r) { return 'data:' + r.mimeType + ';base64,' + r.base64; })
                .catch(function() { return null; })
            );
            compressedPromises.push(
              Capacitor.Plugins.GoogleDrive.fetchCompressedImage({ url: mf.baseUrl })
                .then(function(r) { return 'data:' + r.mimeType + ';base64,' + r.base64; })
                .catch(function() { return null; })
            );
          }
          toast('Compressing photos...');
          Promise.all([Promise.all(thumbPromises), Promise.all(compressedPromises)]).then(function(results) {
            var thumbDataUrls = results[0];
            var compressedDataUrls = results[1];
            var thumbData = {};
            var compressedData = {};
            for (var j = 0; j < mediaIds.length; j++) {
              if (thumbDataUrls[j]) thumbData[mediaIds[j]] = thumbDataUrls[j];
              if (compressedDataUrls[j]) compressedData[mediaIds[j]] = compressedDataUrls[j];
            }
            var photoEntry = {
              lat: lat,
              lng: lng,
              mediaIds: mediaIds,
              baseUrls: baseUrls,
              thumbData: thumbData,
              compressedData: compressedData,
              zoom: map.getZoom()
            };
            photos.push(photoEntry);
            saveData();
            renderPhotos();
            setActiveTool('none');
            toast(mediaIds.length + ' photo(s) added');
          });
        } else {
          toast('No photos selected');
        }
      })
      .catch(function(err) {
        console.error('Failed to fetch picked items', err);
        document.getElementById('photo-picker-overlay').classList.remove('show');
        toast('Failed to load selected photos');
      });
  }

  function renderPhotos() {
    var container = document.getElementById('photo-thumbs-container');
    container.innerHTML = '';
    for (var i = 0; i < photos.length; i++) {
      var photo = photos[i];
      var firstId = photo.mediaIds && photo.mediaIds.length > 0 ? photo.mediaIds[0] : null;
      var thumbData = photo.thumbData && firstId ? photo.thumbData[firstId] : null;
      var div = document.createElement('div');
      div.className = 'photo-thumb';
      div.dataset.index = i;
      div.style.pointerEvents = 'auto';
      var pos = latLngToPixel(photo.lat, photo.lng);
      div.style.left = (pos[0] - 24) + 'px';
      div.style.top = (pos[1] - 24) + 'px';
      if (thumbData) {
        var img = document.createElement('img');
        img.src = thumbData;
        div.appendChild(img);
      } else {
        var placeholder = document.createElement('div');
        placeholder.className = 'photo-thumb-placeholder';
        placeholder.textContent = '\uD83D\uDCF7';
        div.appendChild(placeholder);
      }
      div.addEventListener('click', (function(idx) {
        return function(e) {
          e.stopPropagation();
          openPhotoViewer(idx);
        };
      })(i));
      container.appendChild(div);
    }
  }

  function openPhotoViewer(photoIndex) {
    var photo = photos[photoIndex];
    if (!photo || !photo.mediaIds || photo.mediaIds.length === 0) return;
    photoViewerPhotos = photo.mediaIds.slice();
    photoViewerCurrentPhoto = photo;
    photoViewerPhotoIndex = photoIndex;
    photoViewerCurrentIndex = 0;
    var overlay = document.getElementById('photo-viewer-overlay');
    overlay.classList.add('show');
    renderPhotoViewer();
    var prevBtn = document.querySelector('.photo-viewer-prev');
    var nextBtn = document.querySelector('.photo-viewer-next');
    if (photoViewerPhotos.length > 1) {
      prevBtn.style.display = 'flex';
      nextBtn.style.display = 'flex';
    } else {
      prevBtn.style.display = 'none';
      nextBtn.style.display = 'none';
    }
  }

  function renderPhotoViewer() {
    var content = document.getElementById('photo-viewer-content');
    var counter = document.getElementById('photo-viewer-counter');
    var mediaId = photoViewerPhotos[photoViewerCurrentIndex];
    var imgData = null;
    if (photoViewerCurrentPhoto) {
      imgData = (photoViewerCurrentPhoto.compressedData && photoViewerCurrentPhoto.compressedData[mediaId])
        || (photoViewerCurrentPhoto.thumbData && photoViewerCurrentPhoto.thumbData[mediaId]);
    }
    content.innerHTML = '';
    if (imgData) {
      var img = document.createElement('img');
      img.src = imgData;
      img.style.cursor = 'default';
      content.appendChild(img);
    } else {
      content.innerHTML = '<div style="color:#888;text-align:center;padding:40px">No photo data available.</div>';
    }
    if (photoViewerPhotos.length > 1) {
      counter.textContent = (photoViewerCurrentIndex + 1) + ' / ' + photoViewerPhotos.length;
      counter.style.display = 'block';
    } else {
      counter.style.display = 'none';
    }
  }

  function closePhotoViewer() {
    document.getElementById('photo-viewer-overlay').classList.remove('show');
  }

  function isInMapArea(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    return clientX >= rect.left && clientX <= rect.right && clientY >= rect.top && clientY <= rect.bottom;
  }

  function updateCursor(clientX, clientY) {
    if ((!drawMode && !eraserMode) || !isInMapArea(clientX, clientY)) {
      cursorEl.style.display = 'none';
      return;
    }
    var size = getBrushSize();
    cursorEl.style.display = 'block';
    cursorEl.style.left = clientX + 'px';
    cursorEl.style.top = clientY + 'px';
    cursorEl.style.width = size + 'px';
    cursorEl.style.height = size + 'px';
    cursorEl.style.borderColor = eraserMode ? '#ff4444' : document.getElementById('brush-color').value;
    cursorEl.style.background = eraserMode ? 'rgba(255,68,68,0.2)' : 'transparent';
  }

  function handleMapClick(clientX, clientY) {
    if (!photoMode) return false;
    var rect = canvas.getBoundingClientRect();
    var x = clientX - rect.left;
    var y = clientY - rect.top;
    if (x < 0 || y < 0 || x > canvas.width || y > canvas.height) return false;
    var latlng = pixelToLatLng(x, y);
    openPhotoPicker(latlng[0], latlng[1]);
    return true;
  }

  document.addEventListener('mousedown', function(e) {
    if (photoMode && e.target !== canvas) return;
    if (photoMode && handleMapClick(e.clientX, e.clientY)) return;
    if (e.target === canvas && (drawMode || eraserMode)) {
      startDraw(e.clientX, e.clientY);
    }
  });

  document.addEventListener('mousemove', function(e) {
    updateCursor(e.clientX, e.clientY);
    if (isDrawing) {
      moveDraw(e.clientX, e.clientY);
    }
  });

  document.addEventListener('mouseup', function(e) {
    if (isDrawing) {
      endDraw();
    }
  });

  canvas.addEventListener('touchstart', function(e) {
    if (drawMode || eraserMode || photoMode) {
      e.preventDefault();
      if (photoMode && e.touches.length > 0) {
        if (handleMapClick(e.touches[0].clientX, e.touches[0].clientY)) return;
      }
      if ((drawMode || eraserMode) && e.touches.length > 0) {
        startDraw(e.touches[0].clientX, e.touches[0].clientY);
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    if (drawMode || eraserMode || photoMode) {
      e.preventDefault();
      if (e.touches.length > 0) {
        moveDraw(e.touches[0].clientX, e.touches[0].clientY);
      }
    }
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    if (drawMode || eraserMode || photoMode) {
      e.preventDefault();
      endDraw();
    }
  });

  map.on('moveend zoomend resize', function() { renderAll(); renderPhotos(); });
  map.on('move', function() { renderAll(); renderPhotos(); });

  var brushSize = document.getElementById('brush-size');
  var brushSizeVal = document.getElementById('brush-size-val');
  brushSize.addEventListener('input', function() { brushSizeVal.textContent = brushSize.value; });

  var brushOpacity = document.getElementById('brush-opacity');
  var brushOpacityVal = document.getElementById('brush-opacity-val');
  brushOpacity.addEventListener('input', function() {
    var val = parseInt(brushOpacity.value);
    brushOpacityVal.textContent = val + '%';
    globalOpacity = val / 100;
    for (var i = 0; i < highlights.length; i++) {
      highlights[i].opacity = globalOpacity;
    }
    saveData();
    renderAll();
  });

  var brushColor = document.getElementById('brush-color');
  
  brushColor.addEventListener('input', function() {
    var newColor = brushColor.value;
    for (var i = 0; i < highlights.length; i++) {
      highlights[i].color = newColor;
    }
    saveData();
    renderAll();
  });

  var btnDraw = document.getElementById('btn-draw');
  var btnEraser = document.getElementById('btn-eraser');
  var btnPhoto = document.getElementById('btn-photo');
  var modeIndicator = document.getElementById('mode-indicator');

  function setActiveTool(tool) {
    drawMode = tool === 'draw';
    eraserMode = tool === 'eraser';
    photoMode = tool === 'photo';
    isDrawing = false;
    currentStroke = null;
    btnDraw.classList.toggle('secondary', !drawMode);
    btnEraser.classList.toggle('secondary', !eraserMode);
    btnPhoto.classList.toggle('secondary', !photoMode);
    btnDraw.textContent = drawMode ? 'Drawing' : 'Draw';
    btnEraser.textContent = eraserMode ? 'Erasing' : 'Eraser';
    btnPhoto.textContent = photoMode ? 'Photo' : 'Photo';
    modeIndicator.textContent = drawMode ? 'Drawing' : eraserMode ? 'Erasing' : photoMode ? 'Photos' : 'Viewing';
    modeIndicator.classList.toggle('active', drawMode || eraserMode || photoMode);
    canvas.classList.toggle('active', drawMode || eraserMode || photoMode);
    map.dragging[drawMode || eraserMode || photoMode ? 'disable' : 'enable']();
    cursorEl.style.display = 'none';
    document.querySelectorAll('.photo-thumb').forEach(function(el) { el.style.pointerEvents = photoMode ? 'none' : 'auto'; });
  }

  btnDraw.addEventListener('click', function(e) {
    e.stopPropagation();
    setActiveTool(drawMode ? 'none' : 'draw');
  });

  btnEraser.addEventListener('click', function(e) {
    e.stopPropagation();
    setActiveTool(eraserMode ? 'none' : 'eraser');
  });

  btnPhoto.addEventListener('click', function(e) {
    e.stopPropagation();
    setActiveTool(photoMode ? 'none' : 'photo');
  });

  var photosVisible = true;
  document.getElementById('btn-toggle-photos').addEventListener('click', function(e) {
    e.stopPropagation();
    photosVisible = !photosVisible;
    document.getElementById('photo-thumbs-container').style.display = photosVisible ? '' : 'none';
    this.textContent = photosVisible ? 'Hide' : 'Show';
  });

  function toast(msg) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 1500);
  }

  function setSyncStatus(status, text) {
    var el = document.getElementById('sync-status');
    el.className = status;
    el.textContent = text;
  }

  function isCapacitor() {
    return typeof Capacitor !== 'undefined' && Capacitor.isNativePlatform();
  }

  function isGDriveAvailable() {
    return isCapacitor() && Capacitor.Plugins.GoogleDrive;
  }

  function isGDriveConfigured() {
    return isGDriveAvailable();
  }

  function syncToGDrive() {
    if (!isGDriveConfigured()) return;
    setSyncStatus('syncing', 'Saving...');
    var payload = JSON.stringify({ highlights: highlights, globalOpacity: globalOpacity, photos: photos });
    Capacitor.Plugins.GoogleDrive.writeFile({ data: payload })
      .then(function(result) {
        if (result && result.ok) {
          setSyncStatus('synced', 'Saved');
          setTimeout(function() { setSyncStatus('', ''); }, 3000);
        } else {
          setSyncStatus('error', 'Save failed');
          setTimeout(function() { setSyncStatus('', ''); }, 5000);
        }
      })
      .catch(function(err) {
        setSyncStatus('error', 'Save failed');
        setTimeout(function() { setSyncStatus('', ''); }, 5000);
      });
  }

  function loadFromGDrive(callback) {
    if (!isGDriveConfigured()) { callback(); return; }
    setSyncStatus('syncing', 'Loading...');
    Capacitor.Plugins.GoogleDrive.readFile()
      .then(function(data) {
        if (data && data.highlights) {
          highlights = data.highlights;
          globalOpacity = data.globalOpacity != null ? data.globalOpacity : 0.5;
          photos = data.photos || [];
          saveData();
          setSyncStatus('synced', 'Loaded');
          setTimeout(function() { setSyncStatus('', ''); }, 3000);
        } else {
          setSyncStatus('synced', 'No data');
          setTimeout(function() { setSyncStatus('', ''); }, 3000);
        }
        callback();
      })
      .catch(function(err) {
        setSyncStatus('error', 'Load failed');
        setTimeout(function() { setSyncStatus('', ''); }, 5000);
        callback();
      });
  }

  function openGDriveAuth() {
    if (!isGDriveAvailable()) {
      toast('Google Drive sync not available');
      return;
    }
    saveData();
    Capacitor.Plugins.GoogleDrive.authorize()
      .then(function(result) {
        if (result && result.connected) {
          toast('Connected to GDrive');
          loadFromGDrive(function() {
            var opacityPercent = Math.round(globalOpacity * 100);
            brushOpacity.value = opacityPercent;
            brushOpacityVal.textContent = opacityPercent + '%';
            renderAll();
            renderPhotos();
          });
        }
      })
      .catch(function(err) {
        setSyncStatus('error', 'Auth failed');
        setTimeout(function() { setSyncStatus('', ''); }, 5000);
      });
  }

  var syncDebounce = null;
  function scheduleSync() {
    if (!isGDriveConfigured()) return;
    clearTimeout(syncDebounce);
    syncDebounce = setTimeout(syncToGDrive, 1500);
  }

  var modalOverlay = document.getElementById('modal-overlay');
  var btnGdrive = document.getElementById('btn-gdrive');

  btnGdrive.addEventListener('click', function(e) {
    e.stopPropagation();
    if (!isGDriveAvailable()) {
      toast('Google Drive sync not available');
      return;
    }
    modalOverlay.classList.add('show');
  });

  document.getElementById('modal-cancel').addEventListener('click', function(e) {
    e.stopPropagation();
    modalOverlay.classList.remove('show');
  });

  document.getElementById('modal-connect').addEventListener('click', function(e) {
    e.stopPropagation();
    modalOverlay.classList.remove('show');
    openGDriveAuth();
  });

  modalOverlay.addEventListener('click', function(e) {
    if (e.target === modalOverlay) modalOverlay.classList.remove('show');
  });

  var photoPickerOverlay = document.getElementById('photo-picker-overlay');
  document.getElementById('photo-picker-cancel').addEventListener('click', function(e) {
    e.stopPropagation();
    if (pickerPollTimer) { clearTimeout(pickerPollTimer); pickerPollTimer = null; }
    photoPickerOverlay.classList.remove('show');
  });
  photoPickerOverlay.addEventListener('click', function(e) {
    if (e.target === photoPickerOverlay) {
      if (pickerPollTimer) { clearTimeout(pickerPollTimer); pickerPollTimer = null; }
      photoPickerOverlay.classList.remove('show');
    }
  });

  var photoViewerOverlay = document.getElementById('photo-viewer-overlay');
  document.getElementById('photo-viewer-close').addEventListener('click', function(e) {
    e.stopPropagation();
    closePhotoViewer();
  });
  document.getElementById('photo-viewer-delete').addEventListener('click', function(e) {
    e.stopPropagation();
    if (photoViewerPhotoIndex >= 0 && photoViewerPhotoIndex < photos.length) {
      photos.splice(photoViewerPhotoIndex, 1);
      saveData();
      renderPhotos();
      closePhotoViewer();
      toast('Photo deleted');
    }
  });
  photoViewerOverlay.addEventListener('click', function(e) {
    if (e.target === photoViewerOverlay) closePhotoViewer();
  });
  document.querySelector('.photo-viewer-prev').addEventListener('click', function(e) {
    e.stopPropagation();
    if (photoViewerCurrentIndex > 0) {
      photoViewerCurrentIndex--;
      renderPhotoViewer();
    }
  });
  document.querySelector('.photo-viewer-next').addEventListener('click', function(e) {
    e.stopPropagation();
    if (photoViewerCurrentIndex < photoViewerPhotos.length - 1) {
      photoViewerCurrentIndex++;
      renderPhotoViewer();
    }
  });
  document.addEventListener('keydown', function(e) {
    if (!photoViewerOverlay.classList.contains('show')) return;
    if (e.key === 'Escape') closePhotoViewer();
    if (e.key === 'ArrowLeft' && photoViewerCurrentIndex > 0) {
      photoViewerCurrentIndex--;
      renderPhotoViewer();
    }
    if (e.key === 'ArrowRight' && photoViewerCurrentIndex < photoViewerPhotos.length - 1) {
      photoViewerCurrentIndex++;
      renderPhotoViewer();
    }
  });

  var origSaveData = saveData;
  saveData = function() {
    origSaveData();
    scheduleSync();
  };

  loadData();
  var opacityPercent = Math.round(globalOpacity * 100);
  brushOpacity.value = opacityPercent;
  brushOpacityVal.textContent = opacityPercent + '%';

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function() {});
  }

  if (isGDriveConfigured()) {
    Capacitor.Plugins.GoogleDrive.isConnected()
      .then(function(result) {
        if (result && result.connected) {
          loadFromGDrive(function() {
            var opacityPercent = Math.round(globalOpacity * 100);
            brushOpacity.value = opacityPercent;
            brushOpacityVal.textContent = opacityPercent + '%';
            renderAll();
            renderPhotos();
            toast('Loaded from GDrive');
          });
        } else {
          setSyncStatus('', 'Not connected');
        }
      })
      .catch(function() {
        setSyncStatus('', 'Not connected');
      });
  }
})();
</script>
</body>
</html>
